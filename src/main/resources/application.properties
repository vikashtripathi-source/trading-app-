# Trading Application Configuration

# Server Configuration
server.port=8081
server.servlet.context-path=/

# Database Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/tradingdb
spring.data.mongodb.database=tradingdb

# JWT Configuration
jwt.secret=trading-app-secret-key-2024-hmac-sha-256
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# CORS Configuration
spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:4200
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# WebSocket Configuration
websocket.allowed-origins=http://localhost:3000,http://localhost:4200

# Logging Configuration
logging.level.com.trad.tech=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=INFO

# Rate Limiting Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

