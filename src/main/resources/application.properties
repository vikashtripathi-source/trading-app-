# Trading Application Configuration

# Server Configuration
server.port=8081
server.servlet.context-path=/

# Database Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/tradingdb
spring.data.mongodb.database=tradingdb

# JWT Configuration
jwt.secret=trading-app-secret-key-2024-hmac-sha-256
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# CORS Configuration
spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:4200
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# WebSocket Configuration
websocket.allowed-origins=http://localhost:3000,http://localhost:4200

# Logging Configuration

# Rate Limiting Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Redis Configuration
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.timeout=2000ms
spring.redis.lettuce.pool.max-active=8
spring.redis.lettuce.pool.max-idle=8
spring.redis.lettuce.pool.min-idle=0
spring.redis.lettuce.pool.max-wait=-1ms

# Redis Cache Configuration
spring.cache.type=redis
spring.cache.redis.time-to-live=300000
spring.cache.redis.cache-null-values=false

# Kafka Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=trading-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.trad.tech.model
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.batch-size=16384
spring.kafka.producer.linger-ms=1
spring.kafka.producer.buffer-memory=33554432

# Kafka Topics Configuration
kafka.topics.trade-events=trade-events
kafka.topics.trade-validation=trade-validation
kafka.topics.trade-execution=trade-execution
kafka.topics.trade-errors=trade-errors
kafka.topics.market-data=market-data
kafka.topics.orders=orders
kafka.topics.order-cancellations=order-cancellations
kafka.topics.portfolio-updates=portfolio-updates
kafka.topics.watchlist-events=watchlist-events
kafka.topics.trade-updates=trade-updates
kafka.topics.trade-deletions=trade-deletions

# Enhanced Logging Configuration
logging.level.com.trad.tech=INFO
logging.level.com.trad.tech.kafka=DEBUG
logging.level.com.trad.tech.service=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.data.redis=DEBUG
logging.level.org.springframework.kafka=DEBUG
